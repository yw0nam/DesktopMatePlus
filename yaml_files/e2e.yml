# e2e variant of main.yml
# Uses services.e2e.yml with unauthenticated local MongoDB.
# Usage: YAML_FILE=yaml_files/e2e.yml in e2e.sh

services_file: services.e2e.yml

# Main application settings (same as main.yml)
settings:
  host: "127.0.0.1"
  port: 5500
  cors_origins:
    - "*"
  app_name: "DesktopMate+ Backend"
  app_version: "0.1.0"
  debug: false
  health_check_timeout: 5
  websocket:
    ping_interval_seconds: 30
    pong_timeout_seconds: 10
    max_error_tolerance: 5
    error_backoff_seconds: 0.5
    inactivity_timeout_seconds: 300
    disconnect_timeout_seconds: 5.0
    tts_barrier_timeout_seconds: 30.0
