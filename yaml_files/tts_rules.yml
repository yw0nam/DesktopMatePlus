min_chunk_length: 40

rules:
  - pattern: '\b(?:음|uh|um)+[.\u2026]*'
    replacement: ''
  - pattern: '\s{2,}'
    replacement: ' '

emotion_motion_map:
  "😊":
    keyframes:
      - duration: 0.3
        targets:
          happy: 1.0
  "😆":
    keyframes:
      - duration: 0.3
        targets:
          happy: 1.0
  "😭":
    keyframes:
      - duration: 0.3
        targets:
          sad: 1.0
  "😟":
    keyframes:
      - duration: 0.3
        targets:
          sad: 0.6
  "😠":
    keyframes:
      - duration: 0.3
        targets:
          angry: 0.8
  "😮":
    keyframes:
      - duration: 0.2
        targets:
          surprised: 0.9
  "😲":
    keyframes:
      - duration: 0.2
        targets:
          surprised: 1.0
  "😱":
    keyframes:
      - duration: 0.3
        targets:
          surprised: 1.0
  "😪":
    keyframes:
      - duration: 0.4
        targets:
          neutral: 0.7
  "😌":
    keyframes:
      - duration: 0.3
        targets:
          happy: 0.6
  "🤭":
    keyframes:
      - duration: 0.3
        targets:
          happy: 0.8
  "😰":
    keyframes:
      - duration: 0.3
        targets:
          surprised: 0.7
  "🤔":
    keyframes:
      - duration: 0.3
        targets:
          neutral: 0.8
  default:
    keyframes:
      - duration: 0.3
        targets:
          neutral: 1.0
