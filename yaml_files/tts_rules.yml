rules:
  - pattern: '\((?:웃음|giggle|laughing)\)'
    replacement: ''
  - pattern: '\b(?:음|uh|um)+[.\u2026]*'
    replacement: ''
  - pattern: '\s{2,}'
    replacement: ' '

emotion_keywords:
  - joyful
  - sad
  - angry
  - surprised
  - scared
  - disgusted
  - confused
  - curious
  - worried
  - satisfied
  - sarcastic
  - laughing
  - crying loudly
  - sighing
  - whispering
  - hesitating

emotion_motion_map:
  joyful:        { motion: "happy_idle",     blendshape: "smile" }
  sad:           { motion: "sad_idle",       blendshape: "sad" }
  angry:         { motion: "angry_idle",     blendshape: "angry" }
  surprised:     { motion: "surprised_idle", blendshape: "surprised" }
  scared:        { motion: "scared_idle",    blendshape: "scared" }
  disgusted:     { motion: "disgusted_idle", blendshape: "disgusted" }
  confused:      { motion: "confused_idle",  blendshape: "confused" }
  curious:       { motion: "curious_idle",   blendshape: "curious" }
  worried:       { motion: "worried_idle",   blendshape: "worried" }
  satisfied:     { motion: "satisfied_idle", blendshape: "smile" }
  sarcastic:     { motion: "neutral_idle",   blendshape: "smirk" }
  laughing:      { motion: "laughing_idle",  blendshape: "laugh" }
  crying loudly: { motion: "crying_idle",    blendshape: "cry" }
  sighing:       { motion: "sigh_idle",      blendshape: "tired" }
  whispering:    { motion: "whisper_idle",   blendshape: "neutral" }
  hesitating:    { motion: "hesitate_idle",  blendshape: "nervous" }
  default:       { motion: "neutral_idle",   blendshape: "neutral" }

emotion_prompt_template: |

  [EMOTION INSTRUCTIONS]
  Rules for expressing emotion — follow EXACTLY:

  1. Allowed keywords ONLY: {keywords}
     - ANY other word in parentheses is FORBIDDEN (e.g. (にっこり)(笑)(うっとり)(手を叩いて) are ALL forbidden).
  2. Place the emotion tag at the VERY START of the sentence — NEVER in the middle or at the end.
     - CORRECT:   (joyful) I'm so happy!
     - WRONG:     I'm so happy! (joyful)
     - WRONG:     I'm (joyful) so happy!
  3. One emotion tag per sentence maximum.
  4. NEVER write a sentence that contains ONLY an emotion tag or action — e.g. "(joyful)" alone or "(laughing)" alone is FORBIDDEN. Always attach it to a real sentence.
  5. Do NOT describe gestures or actions in parentheses at all. NO (smiles)(nods)(claps) etc.
