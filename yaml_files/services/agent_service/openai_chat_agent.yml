# Agent Service Configuration
# OpenAI-compatible LLM with mem0 memory and PostgreSQL vocabulary manager

# Agent Service Configuration
llm_config:
  type: "openai_chat_agent"  # Service type for factory
  configs:
    openai_api_base: "http://192.168.0.41:5535/v1"
    model_name: chat_model
    temperature: 0.7
    top_p: 0.9
    support_image: True  # Enable image support
    # openai_api_key is loaded from LLM_API_KEY environment variable

# MCP Server Configuration
# Uncomment to enable MCP tool servers
# mcp_config:
#   "sequential-thinking":
#     command: "npx"
#     args: ["-y", "@modelcontextprotocol/server-sequential-thinking"]
#     transport: "stdio"
#   "code-sandbox":
#     command: "docker"
#     args: ["run", "--rm", "-i", "--net=none", "--memory=512m", "--cpus=1", "ghcr.io/pydantic/mcp-run-python"]
#     transport: "stdio"

# Note: configurations of memory and vocabulary manager should be set in .env files

tool_config:
  builtin:
    filesystem:
      enabled: false
      root_dir: "/tmp/agent-workspace"
    shell:
      enabled: false
      allowed_commands: ["ls", "cat", "grep", "ps", "date", "whoami", "pwd", "wc", "head", "tail"]
    web_search:
      enabled: false
